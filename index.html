<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Noemis Birthday</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    
    <link href="https://fonts.googleapis.com/css2?family=Pacifico&family=Poppins:wght@400;700&display=swap" rel="stylesheet">
    
    <style>
        /* Base Styling */
        body {
            font-family: 'Poppins', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            /* Changed to min-height and overflow-y: auto to prevent mobile clipping */
            min-height: 100vh;
            margin: 0;
            background: linear-gradient(45deg, #2b1055, #ff69b4, #7597de, #ff1493);
            background-size: 400% 400%;
            animation: gradientBG 10s ease infinite;
            color: white;
            text-align: center;
            overflow-x: hidden;
            overflow-y: auto; 
            transition: background 0.5s ease, background-color 1s ease; 
        }

        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        body.birthday-theme {
            background: #ffb6c1 !important; 
            color: #282c34; 
            animation: none;
        }

        .shake {
            animation: screenShake 0.3s ease-in-out;
        }

        @keyframes screenShake {
            0%, 100% { transform: translateX(0); }
            20%, 60% { transform: translateX(-10px); }
            40%, 80% { transform: translateX(10px); }
        }

        /* Container Padding for smaller screens */
        #countdown-view, #birthday-view {
            padding: 20px;
            box-sizing: border-box;
            width: 100%;
            max-width: 800px;
        }

        #countdown-view {
            display: block;
        }

        #countdown-view h1 {
            font-family: 'Pacifico', cursive;
            font-size: 3.5rem;
            color: #fff;
            text-shadow: 3px 3px 0px #ff1493, 6px 6px 0px #4a0e4e;
            margin-bottom: 0;
            line-height: 1.2;
        }

        #countdown-view h2 {
            font-size: 1.2rem;
            color: #fff;
            font-weight: 400;
            margin-top: 10px;
            margin-bottom: 25px;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.5);
        }

        .sarcastic-subtitle {
            font-style: italic;
            color: #ffff00; 
        }

        /* Made the iframe scalable */
        .iframe-wrapper {
            border: 6px dashed #ff69b4;
            border-radius: 20px;
            padding: 10px;
            background: rgba(255, 255, 255, 0.1);
            display: inline-block;
            margin: 15px 0;
            box-shadow: 0 0 20px rgba(255, 105, 180, 0.5);
            max-width: 100%;
            box-sizing: border-box;
        }

        .iframe-wrapper iframe {
            width: 100%;
            max-width: 480px;
            height: auto;
            aspect-ratio: 5 / 4;
        }

        #countdown {
            display: flex;
            justify-content: center;
            flex-wrap: wrap; /* Allows boxes to wrap on extremely narrow screens */
            gap: 20px;
            font-size: 2rem;
            margin-top: 20px;
        }

        .time-box {
            background: linear-gradient(135deg, #ff9a9e 0%, #fecfef 100%);
            color: #d10056;
            padding: 20px;
            border-radius: 50%;
            min-width: 90px;
            height: 90px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            border: 4px solid #fff;
            box-shadow: 0 10px 20px rgba(0,0,0,0.3), inset 0 0 15px rgba(255,255,255,0.8);
            animation: heartbeat 1.5s infinite;
            box-sizing: border-box;
        }

        .time-box:nth-child(1) { animation-delay: 0.0s; }
        .time-box:nth-child(2) { animation-delay: 0.2s; background: linear-gradient(135deg, #a18cd1 0%, #fbc2eb 100%); color: #4a0e4e;}
        .time-box:nth-child(3) { animation-delay: 0.4s; background: linear-gradient(135deg, #84fab0 0%, #8fd3f4 100%); color: #004d40;}
        .time-box:nth-child(4) { animation-delay: 0.6s; background: linear-gradient(135deg, #fccb90 0%, #d57eeb 100%); color: #5a0000;}

        .time-box div { font-weight: 700; }
        .time-box span {
            display: block;
            font-size: 0.8rem;
            text-transform: uppercase;
            margin-top: 2px;
            font-weight: bold;
            letter-spacing: 1px;
        }

        #game-view {
            display: none;
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            overflow: hidden; /* Keep the jumping button inside */
        }
        
        #catch-btn {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            padding: 18px 36px;
            font-size: 1.6rem;
            font-weight: bold;
            font-family: 'Pacifico', cursive; 
            background: linear-gradient(135deg, #ff007f 0%, #ff4500 100%);
            color: white;
            border: 4px solid #fff;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 8px 25px rgba(255, 0, 127, 0.5), inset 0 0 10px rgba(255,255,255,0.4);
            transition: top 0.2s ease, left 0.2s ease, transform 0.1s ease, background 0.3s;
        }

        #catch-btn:hover {
            transform: translate(-50%, -50%) scale(1.1);
            background: linear-gradient(135deg, #ff4500 0%, #ff007f 100%);
            box-shadow: 0 12px 30px rgba(255, 0, 127, 0.8);
        }

        #birthday-view {
            display: none;
            z-index: 10;
        }
        .birthday-title {
            font-size: 4rem;
            margin-bottom: 20px;
            text-shadow: 2px 2px 4px rgba(255,255,255,0.5);
            animation: bounce 2s infinite;
        }
        .options-container {
            display: flex;
            justify-content: center;
            flex-wrap: wrap; /* Allows buttons to stack on mobile */
            gap: 20px;
            margin-top: 30px;
        }
        .option-btn {
            padding: 15px 40px;
            font-size: 1.2rem;
            background: white;
            color: #ff69b4;
            border: 2px solid #ff69b4;
            border-radius: 50px;
            cursor: pointer;
            font-weight: bold;
            transition: transform 0.2s, background 0.2s, color 0.2s;
            max-width: 100%; /* Prevent stretching off-screen */
        }
        .option-btn:hover {
            background: #ff69b4;
            color: white;
            transform: scale(1.1);
        }

        /* Keyframe Animations */
        @keyframes bounce {
            0%, 20%, 50%, 80%, 100% { transform: translateY(0); }
            40% { transform: translateY(-30px); }
            60% { transform: translateY(-15px); }
        }
        
        @keyframes heartbeat {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.08); }
        }

        /* --- MOBILE RESPONSIVE MEDIA QUERIES --- */
        @media (max-width: 768px) {
            #countdown-view h1 { font-size: 2.5rem; }
            #countdown-view h2 { font-size: 1rem; }
            .birthday-title { font-size: 2.8rem; }
            
            #countdown { gap: 10px; }
            
            .time-box {
                min-width: 75px;
                height: 75px;
                padding: 15px;
            }
            .time-box div { font-size: 1.5rem; }
            .time-box span { font-size: 0.7rem; }

            .options-container {
                flex-direction: column;
                align-items: center;
            }
            .option-btn {
                width: 90%;
                padding: 12px 20px;
                font-size: 1rem;
            }
            #catch-btn {
                font-size: 1.3rem;
                padding: 15px 30px;
            }
        }

        @media (max-width: 400px) {
            #countdown-view h1 { font-size: 2rem; }
            .birthday-title { font-size: 2.2rem; }
            
            .time-box {
                min-width: 65px;
                height: 65px;
                padding: 10px;
            }
            .time-box div { font-size: 1.2rem; }
            .time-box span { font-size: 0.6rem; }
        }
    </style>
</head>
<body>

    <div id="countdown-view">
        <h1>Straordinaria Noemi...</h1>
        <h2 class="sarcastic-subtitle">I have a probably very funny surprise for you</h2>
        
        <div class="iframe-wrapper">
            <iframe src="https://giphy.com/embed/9SIXFu7bIUYHhFc19G" style="border: 0;" class="giphy-embed" allowFullScreen></iframe>
        </div>
        
        <h2>Are you checking again? Patience cara, you must still wait:</h2>
        
        <div id="countdown">
            <div class="time-box"><div id="days">00</div><span>Days</span></div>
            <div class="time-box"><div id="hours">00</div><span>Hours</span></div>
            <div class="time-box"><div id="minutes">00</div><span>Mins</span></div>
            <div class="time-box"><div id="seconds">00</div><span>Secs</span></div>
        </div>
    </div>

    <div id="game-view">
        <button id="catch-btn">Click Me!</button>
    </div>

    <div id="birthday-view">
        <h1 class="birthday-title">🎉 Happy Birthday Noemi! 🎂</h1>
        <div class="iframe-wrapper">
            <iframe src="https://giphy.com/embed/OfkGZ5H2H3f8Y" width="372" height="480" style="border: 0;" frameBorder="0" class="giphy-embed" allowFullScreen></iframe>
        </div>
        <h2>Choose your surprise:</h2>
        <div class="options-container">
            <button class="option-btn" onclick="alert('Note that this also includes a cute gift from Guatemala. Please communicate your choice to Mr. Rodrigo')">Fancy romantic dinner</button>
            <button class="option-btn" onclick="alert('Note that this also includes a fancy romantic dinner. Please communicate your choice to Mr. Rodrigo')">A cute gift from Guatemala</button>
            <button class="option-btn" onclick="alert('I knew you would choose this. Please communicate your choice to Mr. Rodrigo')">Both options are correct (greedy)</button>
        </div>
    </div>

    <script>
        // --- 1. COUNTDOWN LOGIC ---
        const targetDate = new Date(2026, 5, 7, 12, 0, 0).getTime();

        const timer = setInterval(function() {
            const now = new Date().getTime();
            const distance = targetDate - now;

            if (distance < 0) {
                clearInterval(timer);
                activateGameView();
                return;
            }

            const days = Math.floor(distance / (1000 * 60 * 60 * 24));
            const hours = Math.floor((distance % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
            const minutes = Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60));
            const seconds = Math.floor((distance % (1000 * 60)) / 1000);

            document.getElementById("days").innerText = days.toString().padStart(2, '0');
            document.getElementById("hours").innerText = hours.toString().padStart(2, '0');
            document.getElementById("minutes").innerText = minutes.toString().padStart(2, '0');
            document.getElementById("seconds").innerText = seconds.toString().padStart(2, '0');
        }, 1000);

        function activateGameView() {
            document.getElementById("countdown-view").style.display = "none";
            document.getElementById("game-view").style.display = "block";
            
            document.body.style.animation = "none";
            document.body.style.background = "#8e44ad"; 
        }

        // --- 2. GAME LOGIC ---
        let clickCount = 0;
        const catchBtn = document.getElementById("catch-btn");

        const gameBackgrounds = [
            "#ff758c", 
            "#20bf6b", 
            "#f7b731", 
            "#3867d6", 
            "#eb3b5a", 
            "#fa8231", 
            "#05c46b"  
        ];

        catchBtn.addEventListener("click", function() {
            if (clickCount < 7) {
                const randomTop = Math.floor(Math.random() * 70) + 10;
                const randomLeft = Math.floor(Math.random() * 70) + 10;
                
                catchBtn.style.top = randomTop + "%";
                catchBtn.style.left = randomLeft + "%";
                
                document.body.style.background = gameBackgrounds[clickCount % gameBackgrounds.length];

                document.body.classList.add("shake");
                setTimeout(() => document.body.classList.remove("shake"), 300);

                confetti({
                    particleCount: 20,
                    spread: 60,
                    origin: { x: randomLeft / 100, y: randomTop / 100 },
                    colors: ['#ff69b4', '#ffffff', '#ffd700']
                });
                
                const phrases = [
                    "Too slow!",
                    "Almost!",
                    "Ancora",
                    "Maybe this will never end???",
                    "One More Time - Daft Punk",
                    "Are you counting?",
                    "Otra vez"
                ];
                catchBtn.innerText = phrases[clickCount];
                
                clickCount++;
            } else {
                activateBirthdayView();
            }
        });

        // --- 3. BIRTHDAY & CONFETTI LOGIC ---
        function activateBirthdayView() {
            document.getElementById("game-view").style.display = "none";
            document.getElementById("birthday-view").style.display = "block";
            
            document.body.classList.add('birthday-theme');
            
            startConfettiRain();
        }

        function startConfettiRain() {
            const duration = 29 * 1000; 
            const animationEnd = Date.now() + duration;
            
            const interval = setInterval(function() {
                const timeLeft = animationEnd - Date.now();

                if (timeLeft <= 0) {
                    return clearInterval(interval);
                }

                confetti({
                    particleCount: 2, 
                    startVelocity: 0, 
                    ticks: 300, 
                    gravity: 0.5, 
                    origin: {
                        x: Math.random(), 
                        y: Math.random() - 0.2 
                    },
                    colors: ['#ff69b4', '#ffffff', '#ffd700', '#282c34']
                });
            }, 100); 
        }
    </script>

</body>
</html>
