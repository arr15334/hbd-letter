<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Noemis Birthday</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        /* Base Styling */
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background-color: #282c34; /* Dark gray for countdown/game */
            color: white;
            text-align: center;
            overflow: hidden;
            transition: background-color 1s ease; /* Smooth background transition */
        }

        /* --- New Theme for the Birthday Section --- */
        body.birthday-theme {
            background-color: #ffb6c1; /* LightPink */
            color: #282c34; /* Dark text for contrast against pink */
        }

        /* --- View 1: Countdown Styles --- */
        #countdown-view {
            display: block;
        }
        #countdown {
            display: flex;
            justify-content: center;
            gap: 15px;
            font-size: 2.5rem;
        }
        .time-box {
            background: #61dafb;
            color: #282c34;
            padding: 15px 20px;
            border-radius: 8px;
            min-width: 70px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
        }
        .time-box span {
            display: block;
            font-size: 0.9rem;
            text-transform: uppercase;
            margin-top: 5px;
            font-weight: bold;
        }

        /* --- View 2: Game Styles --- */
        #game-view {
            display: none;
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
        }
        #catch-btn {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            padding: 15px 30px;
            font-size: 1.5rem;
            font-weight: bold;
            background: #ff4757;
            color: white;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 5px 15px rgba(255, 71, 87, 0.4);
            transition: top 0.2s, left 0.2s;
        }

        /* --- View 3: Birthday Styles --- */
        #birthday-view {
            display: none;
            z-index: 10; /* Ensures content is above confetti */
        }
        .birthday-title {
            font-size: 4rem;
            margin-bottom: 20px;
            text-shadow: 2px 2px 4px rgba(255,255,255,0.5);
            animation: bounce 2s infinite;
        }
        .options-container {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-top: 30px;
        }
        .option-btn {
            padding: 15px 40px;
            font-size: 1.2rem;
            background: white;
            color: #ff69b4; /* HotPink text */
            border: 2px solid #ff69b4;
            border-radius: 50px;
            cursor: pointer;
            font-weight: bold;
            transition: transform 0.2s, background 0.2s, color 0.2s;
        }
        .option-btn:hover {
            background: #ff69b4;
            color: white;
            transform: scale(1.1);
        }

        /* Keyframe Animations */
        @keyframes bounce {
            0%, 20%, 50%, 80%, 100% { transform: translateY(0); }
            40% { transform: translateY(-30px); }
            60% { transform: translateY(-15px); }
        }
    </style>
</head>
<body>

    <div id="countdown-view">
        <h1>Countdown...</h1>
        <div id="countdown">
            <div class="time-box"><div id="days">00</div><span>Days</span></div>
            <div class="time-box"><div id="hours">00</div><span>Hours</span></div>
            <div class="time-box"><div id="minutes">00</div><span>Mins</span></div>
            <div class="time-box"><div id="seconds">00</div><span>Secs</span></div>
        </div>
    </div>

    <div id="game-view">
        <button id="catch-btn">Click Me!</button>
    </div>

    <div id="birthday-view">
        <h1 class="birthday-title">🎉 Happy Birthday Noemi! 🎂</h1>
        <h2>Choose your surprise:</h2>
        <div class="options-container">
            <button class="option-btn" onclick="alert('You chose Option A!')">Option A</button>
            <button class="option-btn" onclick="alert('You chose Option B!')">Option B</button>
            <button class="option-btn" onclick="alert('You chose Option C!')">Option C</button>
        </div>
    </div>

    <script>
        // --- 1. COUNTDOWN LOGIC ---
        // Set for June 7, 2026 at midnight. (Month is 0-indexed: 5 = June)
        const targetDate = new Date(2026, 5, 7, 0, 0, 0).getTime();

        const timer = setInterval(function() {
            const now = new Date().getTime();
            const distance = targetDate - now;

            if (distance < 0) {
                clearInterval(timer);
                activateGameView();
                return;
            }

            // Calculations
            const days = Math.floor(distance / (1000 * 60 * 60 * 24));
            const hours = Math.floor((distance % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
            const minutes = Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60));
            const seconds = Math.floor((distance % (1000 * 60)) / 1000);

            // Output
            document.getElementById("days").innerText = days.toString().padStart(2, '0');
            document.getElementById("hours").innerText = hours.toString().padStart(2, '0');
            document.getElementById("minutes").innerText = minutes.toString().padStart(2, '0');
            document.getElementById("seconds").innerText = seconds.toString().padStart(2, '0');
        }, 1000);

        // Helper to switch from countdown to game
        function activateGameView() {
            document.getElementById("countdown-view").style.display = "none";
            document.getElementById("game-view").style.display = "block";
        }

        // --- 2. GAME LOGIC ---
        let clickCount = 0;
        const catchBtn = document.getElementById("catch-btn");

        catchBtn.addEventListener("click", function() {
            if (clickCount < 7) {
                // Game continues: Jump button
                const randomTop = Math.floor(Math.random() * 70) + 10;
                const randomLeft = Math.floor(Math.random() * 70) + 10;
                
                catchBtn.style.top = randomTop + "%";
                catchBtn.style.left = randomLeft + "%";
                
                const phrases = [
                    "Too slow!",
                    "Almost!",
                    "Try again!",
                    "Ancora",
                    "One More Time - Daft Punk",
                    "Are you counting?",
                    "Otra vez"
                ];
                catchBtn.innerText = phrases[clickCount];
                
                clickCount++;
            } else {
                // Game Over: Activate Birthday View
                activateBirthdayView();
            }
        });

        // --- 3. BIRTHDAY & CONFETTI LOGIC ---
        function activateBirthdayView() {
            // Hide game, show birthday content
            document.getElementById("game-view").style.display = "none";
            document.getElementById("birthday-view").style.display = "block";
            
            // Apply the pink theme class to the body
            document.body.classList.add('birthday-theme');
            
            // Start the Confetti "Rain" effect
            startConfettiRain();
        }

        function startConfettiRain() {
            // Set a duration for how long new confetti keeps spawning (e.g., 15 seconds)
            const duration = 29 * 1000; 
            const animationEnd = Date.now() + duration;
            
            // Define a repeating interval to fire small bursts from random tops
            const interval = setInterval(function() {
                const timeLeft = animationEnd - Date.now();

                // Stop spawning new confetti when time runs out
                if (timeLeft <= 0) {
                    return clearInterval(interval);
                }

                // Fire a small burst of confetti
                // We use standard colors, but add HotPink (#ff69b4) to match the theme
                confetti({
                    particleCount: 2, // Keep count low per burst for continuous rain effect
                    startVelocity: 0, // Let them fall from the start
                    ticks: 300, // How long they stay on screen
                    gravity: 0.5, // How fast they fall
                    origin: {
                        x: Math.random(), // Random horizontal position
                        // Spawning slightly above the top edge so they fall into view
                        y: Math.random() - 0.2 
                    },
                    colors: ['#ff69b4', '#ffffff', '#ffd700', '#282c34'] // HotPink, White, Gold, Dark
                });
            }, 100); // How often a new particle is spawned (every 100ms)
        }
    </script>

</body>
</html>
